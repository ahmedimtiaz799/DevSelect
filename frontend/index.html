<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="DevSelect — Know who to hire before the interview. AI-powered candidate evaluation using CV and GitHub analysis." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
    <script>
      (() => {
        const key = 'devselect-theme'
        const allowed = new Set(['system', 'light', 'dark'])

        try {
          let choice = localStorage.getItem(key)

          if (!allowed.has(choice)) {
            choice = 'system'
            localStorage.setItem(key, choice)
          }

          const prefersDark = window.matchMedia?.('(prefers-color-scheme: dark)').matches
          const resolvedTheme = choice === 'system'
            ? (prefersDark ? 'dark' : 'light')
            : choice

          document.documentElement.setAttribute('data-theme', resolvedTheme)
          document.documentElement.setAttribute('data-theme-choice', choice)
        } catch {
          const prefersDark = window.matchMedia?.('(prefers-color-scheme: dark)').matches
          document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light')
          document.documentElement.setAttribute('data-theme-choice', 'system')
        }
      })()
    </script>
    <title>DevSelect</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
