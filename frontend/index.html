<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="DevSelect — Know who to hire before the interview. AI-powered candidate evaluation using CV and GitHub analysis." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#2B2D42" />
    <link
      rel="preload"
      href="/fonts/Inter-Variable.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <script>
      (() => {
        const key = 'devselect-theme'
        const allowed = new Set(['system', 'light', 'dark'])

        try {
          let choice = localStorage.getItem(key)

          if (!allowed.has(choice)) {
            choice = 'system'
            localStorage.setItem(key, choice)
          }

          const prefersDark = window.matchMedia?.('(prefers-color-scheme: dark)').matches
          const resolvedTheme = choice === 'system'
            ? (prefersDark ? 'dark' : 'light')
            : choice

          document.documentElement.setAttribute('data-theme', resolvedTheme)
          document.documentElement.setAttribute('data-theme-choice', choice)
        } catch {
          const prefersDark = window.matchMedia?.('(prefers-color-scheme: dark)').matches
          document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light')
          document.documentElement.setAttribute('data-theme-choice', 'system')
        }
      })()
    </script>
    <title>DevSelect</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
